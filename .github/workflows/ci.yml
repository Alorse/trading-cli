name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run gofmt
        run: test -z "$(gofmt -l .)" || (echo "Code is not formatted:" && gofmt -l . && exit 1)

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -race -coverprofile=coverage.out

      - name: Check coverage
        run: go tool cover -func=coverage.out

      - name: Build
        run: go build ./cmd/trading-cli/
