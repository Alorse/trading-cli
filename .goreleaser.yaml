version: 2

project_name: trading-cli

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: trading-cli
    main: ./cmd/trading-cli
    binary: trading-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/alorse/trading-cli/pkg/tools/system.Version={{.Version}}
      - -X github.com/alorse/trading-cli/pkg/tools/system.Commit={{.Commit}}
      - -X github.com/alorse/trading-cli/pkg/tools/system.Date={{.Date}}
    flags:
      - -trimpath

archives:
  - id: trading-cli
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/TOOLS.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug Fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: "\U0001F527 Others"
      order: 999

release:
  github:
    owner: alorse
    name: trading-cli
  draft: false
  prerelease: auto
  name_template: "{{.ProjectName}}-{{.Version}}"
  header: |
    ## Installation

    ### macOS/Linux (Homebrew)
    ```bash
    brew tap alorse/trading-cli
    brew install trading-cli
    ```

    ### Go install
    ```bash
    go install github.com/alorse/trading-cli/cmd/trading-cli@{{.Tag}}
    ```

    ### Binary download
    Download the appropriate binary for your platform from the assets below.

brews:
  - name: trading-cli
    repository:
      owner: alorse
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/alorse/trading-cli"
    description: "Technical analysis and trading tools CLI"
    license: "MIT"
    test: |
      system "#{bin}/trading-cli", "version"
    install: |
      bin.install "trading-cli"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
